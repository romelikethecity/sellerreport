<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1D4ED8"/>
  
  <!-- Subtle pattern/texture -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Icon -->
  <rect x="460" y="160" width="120" height="120" rx="24" fill="white"/>
  <path d="M520 195 L555 230 L545 240 L520 215 L495 240 L485 230 Z" fill="#1D4ED8"/>
  
  <!-- Wordmark -->
  <text x="600" y="370" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="700" fill="white">The Seller Report</text>
  
  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="400" fill="white" fill-opacity="0.8">Sales compensation data, methodology guides, and career intelligence</text>
</svg>
